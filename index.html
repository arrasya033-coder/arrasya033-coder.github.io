<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Gua</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: #00ffcc;
  text-align: center;
  overflow: hidden;
  background: black;
}

/* 🌌 bintang */
canvas {
  position: fixed;
  top: 0;
  left: 0;
}

/* 💻 teks hacker */
h1 {
  margin-top: 100px;
  font-size: 35px;
  text-shadow: 0 0 10px #00ffcc;
}

/* tombol */
button {
  margin-top: 30px;
  padding: 12px 25px;
  border: none;
  border-radius: 10px;
  background: #00ffcc;
  color: black;
  cursor: pointer;
  box-shadow: 0 0 20px #00ffcc;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
  box-shadow: 0 0 40px #00ffcc;
}

/* ✨ cursor glow */
.cursor {
  position: fixed;
  width: 15px;
  height: 15px;
  background: #00ffcc;
  border-radius: 50%;
  pointer-events: none;
  box-shadow: 0 0 20px #00ffcc;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<h1>💻 Website Hacker Gua</h1>
<p id="text"></p>

<button onclick="klik()">Klik Gua 😎</button>

<div class="cursor" id="cursor"></div>

<audio id="music" src="https://www.thetutututusong(Beat Magica)(Ultra Slowed +Reverb)[NQDinnsjabs].mp3></audio>

<script>

/* 🎵 musik */
window.onload = () => {
  document.body.onclick = () => {
    document.getElementById("music").play();
  }
}

/* ⌨️ typing effect */
let i = 0;
let txt = "Selamat datang di website aink Ilham 😈🔥";
function ketik() {
  if (i < txt.length) {
    document.getElementById("text").innerHTML += txt.charAt(i);
    i++;
    setTimeout(ketik, 50);
  }
}
ketik();

/* 🖱️ cursor glow */
const cursor = document.getElementById("cursor");
document.addEventListener("mousemove", e => {
  cursor.style.top = e.clientY + "px";
  cursor.style.left = e.clientX + "px";
});

/* 🌌 bintang */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];
for (let i = 0; i < 100; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 2
  });
}

function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "#00ffcc";

  stars.forEach(s => {
    ctx.fillRect(s.x, s.y, s.size, s.size);
  });
}

function updateStars() {
  stars.forEach(s => {
    s.y += 0.5;
    if (s.y > canvas.height) s.y = 0;
  });
}

function animate() {
  drawStars();
  updateStars();
  requestAnimationFrame(animate);
}
animate();

/* tombol */
function klik() {
  alert("Mode hacker aktif 😈🔥");
}

</script>

</body>
</html>
