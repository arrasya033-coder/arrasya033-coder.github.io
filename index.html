<script>
// AUTOPLAY (butuh klik dulu)
document.body.addEventListener("click", function () {
  const music = document.getElementById("music");
  if (music) {
    music.play();
  }
});

// TYPING
let i = 0;
let txt = "Selamat datang di website Ilham aink 😈🔥";

function ketik() {
  const el = document.getElementById("text");
  if (!el) return; // biar gak error kalau id gak ada

  if (i < txt.length) {
    el.innerHTML += txt.charAt(i);
    i++;
    setTimeout(ketik, 40);
  }
}
ketik();

// ALERT
function klik() {
  alert("Wih ditekan juga 😈🔥");
}

// GAME
let score = 0;

function addScore() {
  score++;
  const el = document.getElementById("score");
  if (el) el.innerText = score;
}

function resetScore() {
  score = 0;
  const el = document.getElementById("score");
  if (el) el.innerText = score;
}
</script>

</body>
</html>
