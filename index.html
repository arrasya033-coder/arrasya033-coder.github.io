

<!DOCTYPE html>
<html>
<head>
<title>Website Aink Ilham</title>

<style>
body {
  margin: 0;
  font-family: monospace;
  background: black;
  color: #00ff99;
  text-align: center;
}

h1 {
  margin-top: 50px;
  font-size: 40px;
  text-shadow: 0 0 10px #00ff99;
}

button {
  padding: 10px 20px;
  background: black;
  border: 2px solid #00ff99;
  color: #00ff99;
  border-radius: 10px;
  cursor: pointer;
}

.card {
  margin: 20px;
}

img {
  width: 150px;
  border-radius: 10px;
  border: 2px solid #00ff99;
}

#game {
  margin-top: 50px;
}
</style>

</head>
<body>

<h1>💻 Website Hacker Aink 😈</h1>

<p id="text"></p>

<button onclick="klik()">Klik Gue 😎</button>

<!-- Gambar Gen Z + Horror -->
<div class="card">
  <img src="https://i.imgur.com/3ZQ3Z9k.jpeg">
  <img src="https://i.imgur.com/8Km9tLL.jpeg">
  <img src="https://i.imgur.com/2DhmtJ4.jpeg">
</div>

<!-- MINI GAME -->
<div id="game">
  <h2>🎮 Mini Game - Klik Cepat</h2>
  <p>Score: <span id="score">0</span></p>
  <button onclick="addScore()">KLIK CEPAT ⚡</button>
  <button onclick="resetScore()">RESET</button>
</div>

<!-- AUDIO -->
<audio id="music" src="https://drive.google.com/file/d/1c5hwvkcKoBC_qaDGE_8DyYh3xzaNeppJ/view?usp=drivesdk "></audio>

<script>
// musik play
document.body.onclick = () => {
  document.getElementById("music").play();
}

// typing effect
let i = 0;
let txt = "Selamat datang di website aink ilham 😈🔥";
function ketik() {
  if (i < txt.length) {
    document.getElementById("text").innerHTML += txt.charAt(i);
    i++;
    setTimeout(ketik, 50);
  }
}
ketik();

// tombol klik
function klik() {
  alert("Wih ditekan juga 😈🔥");
}

// mini game
let score = 0;

function addScore() {
  score++;
  document.getElementById("score").innerText = score;
}

function resetScore() {
  score = 0;
  document.getElementById("score").innerText = score;
}
</script>

</body>
</html>
