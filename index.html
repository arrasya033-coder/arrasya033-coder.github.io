<!DOCTYPE html>
<html>
<head>
  <title>Website Gue</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      text-align: center;
    }
    .card {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      margin: 100px auto;
      width: 80%;
      border-radius: 20px;
    }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>🚀 Website Gue</h1>
  <p id="teks">Klik tombol di bawah</p>

  <button onclick="ganti()">Klik</button>
</div>

<script>
function ganti() {
  const kata = [
    "🔥 Mantap!",
    "😎 Gua ilham",
    "🚀 Anjay gelo!",
    "💻 Mabar gaskeun!",
    "⚡ GG!"
  ];
  
  let random = Math.floor(Math.random() * kata.length);
  document.getElementById("teks").innerHTML = kata[random];
}
</script>

</body>
</html>+
