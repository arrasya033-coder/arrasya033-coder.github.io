<!DOCTYPE html>
<html>
<head>
<title>Website Aink Ilham 😈</title>

<style>
body {
  margin: 0;
  font-family: monospace;
  text-align: center;
  color: white;
  overflow: hidden;
}

/* BACKGROUND GEN Z ANIMASI */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: linear-gradient(45deg, #ff00cc, #3333ff, #00ffcc, #ff0000);
  background-size: 400% 400%;
  animation: bgMove 10s infinite linear;
  z-index: -1;
}

@keyframes bgMove {
  0% { transform: translate(0,0); }
  50% { transform: translate(-25%, -25%); }
  100% { transform: translate(0,0); }
}

/* TEXT */
h1 {
  margin-top: 50px;
  font-size: 35px;
  text-shadow: 0 0 15px cyan;
}

/* BUTTON */
button {
  padding: 12px 25px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  background: black;
  color: cyan;
  border: 2px solid cyan;
  cursor: pointer;
}

/* GAMBAR */
.card img {
  width: 120px;
  margin: 10px;
  border-radius: 10px;
  border: 2px solid white;
  animation: goyang 2s infinite alternate;
}

@keyframes goyang {
  from { transform: rotate(-5deg); }
  to { transform: rotate(5deg); }
}

/* GAME */
#game {
  margin-top: 40px;
}
</style>

</head>
<body>

<h1>💻 Website Ilham Aink 😈🔥</h1>

<p id="text"></p>

<button onclick="klik()">Klik Gue 😎</button>

<!-- GAMBAR GEN Z -->
<div class="card">
  <img src="https://i.imgur.com/3ZQ3Z9k.jpeg">
  <img src="https://i.imgur.com/8Km9tLL.jpeg">
  <img src="https://i.imgur.com/2DhmtJ4.jpeg">
</div>

<!-- MINI GAME -->
<div id="game">
  <h2>🎮 Mini Game</h2>
  <p>Score: <span id="score">0</span></p>
  <button onclick="addScore()">KLIK CEPAT ⚡</button>
  <button onclick="resetScore()">RESET</button>
</div>

<!-- AUDIO -->
<audio id="music" src="https://files.catbox.moe/8kq1p3.mp3"></audio>

<script>
// AUTOPLAY (butuh klik dulu)
document.body.onclick = () => {
  document.getElementById("music").play();
}

// TYPING
let i = 0;
let txt = "Selamat datang di website hacker aink 😈🔥";
function ketik() {
  if (i < txt.length) {
    document.getElementById("text").innerHTML += txt.charAt(i);
    i++;
    setTimeout(ketik, 40);
  }
}
ketik();

// ALERT
function klik() {
  alert("Wih ditekan juga 😈🔥");
}

// GAME
let score = 0;

function addScore() {
  score++;
  document.getElementById("score").innerText = score;
}

function resetScore() {
  score = 0;
  document.getElementById("score").innerText = score;
}
</script>

</body>
</html>
