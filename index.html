<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Aink Ilham</title>

<style>
body {
  margin: 0;
  font-family: monospace;
  color: #00ff99;
  text-align: center;
  overflow: hidden;

  /* 🌌 background gambar + gerak */
  background: url('https://i.imgur.com/6Iej2c3.jpeg') no-repeat center center fixed;
  background-size: cover;
  animation: zoom 20s infinite alternate;
}

@keyframes zoom {
  0% {transform: scale(1);}
  100% {transform: scale(1.1);}
}

h1 {
  margin-top: 50px;
  font-size: 40px;
  text-shadow: 0 0 15px #00ff99;
}

button {
  padding: 10px 20px;
  background: black;
  border: 2px solid #00ff99;
  color: #00ff99;
  border-radius: 10px;
  cursor: pointer;
  margin: 5px;
}

.card {
  margin: 20px;
}

img {
  width: 120px;
  border-radius: 10px;
  border: 2px solid #00ff99;
}

#game {
  margin-top: 40px;
}
</style>

</head>
<body>

<h1>💻 Website Hacker Aink 😈</h1>

<p id="text"></p>

<button onclick="klik()">Klik Gue 😎</button>

<!-- Gambar -->
<div class="card">
  <img src="https://i.imgur.com/3ZQ3Z9k.jpeg">
  <img src="https://i.imgur.com/8Km9tLL.jpeg">
  <img src="https://i.imgur.com/2DhmtJ4.jpeg">
</div>

<!-- MINI GAME -->
<div id="game">
  <h2>🎮 Mini Game</h2>
  <p>Score: <span id="score">0</span></p>
  <button onclick="addScore()">KLIK ⚡</button>
  <button onclick="resetScore()">RESET</button>
</div>

<!-- AUDIO (udah aku isi lagu yang WORK) -->
<audio id="music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>

<script>
// 🎵 musik (harus klik dulu biar bunyi)
document.body.onclick = () => {
  document.getElementById("music").play();
}

// ⌨️ typing effect
let i = 0;
let txt = "Selamat datang di website hacker aink 😈🔥";
function ketik() {
  if (i < txt.length) {
    document.getElementById("text").innerHTML += txt.charAt(i);
    i++;
    setTimeout(ketik, 50);
  }
}
ketik();

// tombol klik
function klik() {
  alert("Mode hacker aktif 😈🔥");
}

// 🎮 mini game
let score = 0;

function addScore() {
  score++;
  document.getElementById("score").innerText = score;
}

function resetScore() {
  score = 0;
  document.getElementById("score").innerText = score;
}
</script>

</body>
</html>
